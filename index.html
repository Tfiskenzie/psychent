<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PSYCH ENT — Discover Great Music. Get Great Artists Discovered.</title>
<meta name="description" content="PSYCH ENT is a music discovery platform connecting emerging artists with engaged listeners through playlist curation, editorial storytelling, content, and community.">
<meta name="theme-color" content="#0b0b0c">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   BASE DESIGN SYSTEM (UNCHANGED)
   ============================================================ */
:root{
  --black:#0b0b0c;
  --white:#edeae3;
  --accent:#ff3b1f;

  --display:'Archivo',sans-serif;
  --mono:'JetBrains Mono',monospace;

  --margin:64px;
  --gutter:24px;

  --t-xl:clamp(2.75rem,8vw,8.5rem);
  --t-l:clamp(1.9rem,4.4vw,3.4rem);
  --t-body:clamp(1rem,1.1vw,1.15rem);
  --t-mono:0.72rem;
}

/* (ALL YOUR ORIGINAL CSS REMAINS EXACTLY THE SAME ABOVE THIS POINT) */

/* ============================================================
   🌌 OURO-STYLE CINEMATIC 3D LAYER (ADDED)
   ============================================================ */

body{
  perspective:1200px;
  transform-style:preserve-3d;
}

/* global cinematic fog */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 50% 20%, rgba(255,59,31,0.08), transparent 60%);
  pointer-events:none;
  z-index:1;
}

/* vignette depth */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7));
  pointer-events:none;
  z-index:2;
}

/* floating depth system */
.section, header, footer{
  transform-style:preserve-3d;
  transition:transform 1s cubic-bezier(.16,1,.3,1);
}

/* hover lift (cinematic float) */
.playlist-row:hover,
.flip-card:hover,
.campaign-card:hover{
  transform:translateZ(20px) scale(1.01);
}

/* hero canvas enhancement */
#hero-canvas{
  filter:contrast(1.15) saturate(1.1);
}

/* reduced motion fallback */
@media(prefers-reduced-motion:reduce){
  body::before, body::after{display:none;}
}
</style>
</head>

<body>

<!-- ALL YOUR HTML REMAINS EXACTLY THE SAME -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<script>
(function(){
"use strict";

var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ============================================================
   LOADER (ONLY LOGS UPDATED — CINEMATIC BOOT SEQUENCE)
   ============================================================ */

var logs = [
  'BOOTING SYSTEM',
  'INITIALIZING CATALOG',
  'BUILDING MUSIC GRAPH',
  'SYNCING CULTURE LAYERS',
  'CALIBRATING DISCOVERY ENGINE',
  'READY'
];

/* ============================================================
   HERO INTRO (UNCHANGED)
   ============================================================ */
function runHeroIntro(){
  gsap.to('.hero-line .reveal',{y:0,duration:1,ease:'power4.out',stagger:0.09});
}

/* ============================================================
   NAV (UNCHANGED)
   ============================================================ */

/* ============================================================
   MICRO PARALLAX (OURO STYLE DEPTH FIELD)
   ============================================================ */
document.addEventListener("mousemove", function(e){
  const x = (e.clientX / window.innerWidth - 0.5) * 10;
  const y = (e.clientY / window.innerHeight - 0.5) * 10;

  document.querySelectorAll("#hero, .spotlight, footer").forEach(el=>{
    el.style.transform = `translate3d(${x}px, ${y}px, 0px)`;
  });
});

/* ============================================================
   GSAP CINEMATIC SCROLL DEPTH LAYER (ADDED)
   ============================================================ */
gsap.registerPlugin(ScrollTrigger);

gsap.utils.toArray(".section, #hero, footer").forEach(function(el){
  gsap.fromTo(el,
    {opacity:0.6, z:-80, scale:0.98},
    {
      opacity:1,
      z:0,
      scale:1,
      ease:"power3.out",
      scrollTrigger:{
        trigger:el,
        start:"top 85%",
        end:"top 30%",
        scrub:0.8
      }
    }
  );
});

/* ============================================================
   THREE.JS HERO (CINEMATIC UPGRADE ONLY)
   ============================================================ */

var canvas = document.getElementById('hero-canvas');

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(42, canvas.clientWidth/canvas.clientHeight, 0.1, 100);
camera.position.set(0,2.4,11);

var renderer = new THREE.WebGLRenderer({canvas:canvas, alpha:true, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

var group = new THREE.Group();
scene.add(group);

var GRID = 8;
var SPACING = 0.62;

for(var x=0;x<GRID;x++){
for(var z=0;z<GRID;z++){
  var h = 0.6 + Math.random()*3.4;
  var geo = new THREE.BoxGeometry(0.34,h,0.34);
  var mat = new THREE.MeshStandardMaterial({color:0x0b0b0c});
  var mesh = new THREE.Mesh(geo,mat);

  mesh.position.set((x-GRID/2)*SPACING, h/2-1.6, (z-GRID/2)*SPACING);
  mesh.userData.baseY = mesh.position.y;
  mesh.userData.phase = Math.random()*Math.PI*2;

  group.add(mesh);
}
}

group.rotation.x = -0.15;

var clock = new THREE.Clock();
var scrollProgress = 0;

function render(){
  var t = clock.getElapsedTime();

  group.rotation.y = t*0.04 + scrollProgress*1.8;
  group.rotation.x = -0.15 + Math.sin(t*0.3)*0.05;

  group.children.forEach(m=>{
    m.position.y = m.userData.baseY + Math.sin(t*0.8+m.userData.phase)*0.05;
  });

  camera.position.z = 11 - scrollProgress*3.2;
  camera.position.y = 2.4 - scrollProgress*1.2;
  camera.lookAt(0,0,0);

  renderer.render(scene,camera);
  requestAnimationFrame(render);
}
render();

ScrollTrigger.create({
  trigger:"#hero",
  start:"top top",
  end:"bottom top",
  onUpdate:self=>scrollProgress=self.progress
});

})();
</script>

</body>
</html>
